# cd-onboarding.yaml — Generated 2026-06-24 03:20:42 UTC
schemaVersion: "1.0"
deployStrategy: rolling
approvalRequired: true
stages:
  - id: smoke
    enabled: true
    config:
      healthCheckUrl: https://some-service.dev.npci.org.in/health
      timeoutSeconds: 120
  - id: load
    enabled: true
    config:
      scenarioFile: tests/load/some-service-load.jmx
      virtualUsers: 50
      durationMinutes: 10
  - id: deploy-dev
    enabled: true
    config:
      environment: dev
      strategy: rolling
      entryCommand: kubectl apply -f k8s/dev/
      rollbackOnFailure: true
      approvalGate: false
  - id: deploy-staging
    enabled: true
    config:
      environment: staging
      strategy: canary
      entryCommand: kubectl apply -f k8s/staging/
      rollbackOnFailure: true
      approvalGate: true
      canaryWeight: 20
