# cd-onboarding.yaml — Generated 2026-06-24 02:06:12 UTC
schemaVersion: "1.0"
deployStrategy: rolling
approvalRequired: true
stages:
  - id: smoke
    enabled: true
    config:
      healthCheckUrl: https://test-repo.dev.npci.org.in/health
      timeoutSeconds: 120
  - id: load
    enabled: true
    config:
      scenarioFile: tests/load/test-repo-load.jmx
      virtualUsers: 50
      durationMinutes: 10
  - id: deploy-dev
    enabled: true
    config:
      environment: dev
      strategy: rolling
      entryCommand: kubectl apply -f k8s/dev/
      rollbackOnFailure: true
      approvalGate: false
  - id: deploy-uat
    enabled: true
    config:
      environment: uat
      strategy: canary
      entryCommand: kubectl apply -f k8s/uat/
      rollbackOnFailure: true
      approvalGate: true
      canaryWeight: 20
