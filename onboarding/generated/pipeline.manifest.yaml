# application-onboarding.yaml — Generated 2026-06-24 12:45:45 UTC
schemaVersion: "1.0"
type: python
languageVersion: "3.11"
packageManager: pip
artifactName: test-repo
artifactPath: dist/test-repo.whl
dockerfile:
  enabled: true
  path: Dockerfile
deployTarget:
  platform: kubernetes
  namespace: enterprise-architect
  cluster: prod-cluster-01
buildCommand: pip install -r requirements.txt
testCommand: pytest

---
# ci-onboarding.yaml — Generated 2026-06-24 12:45:45 UTC
schemaVersion: "1.0"
triggers:
  - push
  - pull_request
stages:
  - id: sonar
    override: false
    config:
      script_file_name: "default-sonar.sh"
      command: "sh onboarding/ci/sonar/default-sonar.sh"
  - id: arch-as-code
    override: false
    config:
      script_file_name: "default-arch.sh"
      command: "sh onboarding/ci/arch/default-arch.sh"
  - id: checkmarx
    override: false
    config:
      script_file_name: "default-checkmarx.sh"
      command: "sh onboarding/ci/checkmarx/default-checkmarx.sh"
  - id: test
    override: false
    config:
      script_file_name: "default-test.sh"
      command: "sh onboarding/ci/test/default-test.sh"
  - id: build
    override: false
    config:
      script_file_name: "default-build.sh"
      command: "sh onboarding/ci/build/default-build.sh"

---
# cd-onboarding.yaml — Generated 2026-06-24 12:45:45 UTC
schemaVersion: "1.0"
deployStrategy: rolling
approvalRequired: true
stages:
  - id: smoke
    enabled: true
    config:
      healthCheckUrl: https://test-repo.dev.npci.org.in/health
      timeoutSeconds: 120
  - id: load
    enabled: true
    config:
      scenarioFile: tests/load/test-repo-load.jmx
      virtualUsers: 50
      durationMinutes: 10
  - id: deploy-dev
    enabled: true
    config:
      environment: dev
      strategy: rolling
      entryCommand: kubectl apply -f k8s/dev/
      rollbackOnFailure: true
      approvalGate: false
  - id: deploy-uat
    enabled: true
    config:
      environment: uat
      strategy: canary
      entryCommand: kubectl apply -f k8s/uat/
      rollbackOnFailure: true
      approvalGate: true
      canaryWeight: 20
