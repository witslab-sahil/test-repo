apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-repo
  labels:
    app: test-repo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-repo
  template:
    metadata:
      labels:
        app: test-repo
    spec:
      containers:
        - name: test-repo
          image: test-repo:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: test-repo
  labels:
    app: test-repo
spec:
  selector:
    app: test-repo
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
